<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Matrix — 四象限任務板</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="todo-matrix.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="6" height="6" rx="1.5" fill="white"/>
        <rect x="9" y="1" width="6" height="6" rx="1.5" fill="white" opacity="0.5"/>
        <rect x="1" y="9" width="6" height="6" rx="1.5" fill="white" opacity="0.5"/>
        <rect x="9" y="9" width="6" height="6" rx="1.5" fill="white" opacity="0.25"/>
      </svg>
    </div>
    <span class="logo-name">Task Matrix</span>
  </div>
  <div class="header-right">
    <div class="filter-bar">
      <span class="filter-label">篩選：</span>
      <div id="filterPills"></div>
    </div>
    <button class="add-btn" onclick="openModal()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1v10M1 6h10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      新增任務
    </button>
  </div>
</header>

<main class="main">
  <div class="stats-bar" id="statsBar"></div>

  <div class="axis-wrapper">
    <!-- corner spacer -->
    <div></div>
    <!-- column headers -->
    <div class="axis-top"><span class="dot" style="background:#E24B4A"></span>急迫</div>
    <div class="axis-top"><span class="dot" style="background:#D4820A"></span>不急迫</div>
    <!-- row 1: 重要 -->
    <div class="axis-side"><span>重要</span></div>
    <div class="quadrant q1" id="q1">
      <div class="q-header">
        <div class="q-label"><span class="q-label-dot"></span>立即處理</div>
        <span class="q-count" id="cnt-q1">0</span>
      </div>
    </div>
    <div class="quadrant q2" id="q2">
      <div class="q-header">
        <div class="q-label"><span class="q-label-dot"></span>排程規劃</div>
        <span class="q-count" id="cnt-q2">0</span>
      </div>
    </div>
    <!-- row 2: 不重要 -->
    <div class="axis-side"><span>不重要</span></div>
    <div class="quadrant q3" id="q3">
      <div class="q-header">
        <div class="q-label"><span class="q-label-dot"></span>委派他人</div>
        <span class="q-count" id="cnt-q3">0</span>
      </div>
    </div>
    <div class="quadrant q4" id="q4">
      <div class="q-header">
        <div class="q-label"><span class="q-label-dot"></span>考慮刪除</div>
        <span class="q-count" id="cnt-q4">0</span>
      </div>
    </div>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">新增任務</div>

    <div class="form-field">
      <label class="form-label">任務名稱</label>
      <input class="form-input" type="text" id="taskTitle" placeholder="輸入任務描述...">
    </div>

    <div class="form-field">
      <label class="form-label">象限（急迫 × 重要）</label>
      <div class="q-grid">
        <div class="q-pick opt-q1" data-q="q1" onclick="selectQ('q1')">急迫 + 重要</div>
        <div class="q-pick unsel"  data-q="q2" onclick="selectQ('q2')">不急迫 + 重要</div>
        <div class="q-pick unsel"  data-q="q3" onclick="selectQ('q3')">急迫 + 不重要</div>
        <div class="q-pick unsel"  data-q="q4" onclick="selectQ('q4')">不急迫 + 不重要</div>
      </div>
    </div>

    <div class="form-field">
      <label class="form-label">截止日期</label>
      <input class="form-input" type="date" id="taskDate">
    </div>

    <div class="form-field">
      <label class="form-label">分類標籤</label>
      <div class="tag-cloud" id="tagCloud"></div>
      <div class="tag-add-row">
        <input class="form-input" type="text" id="newTagInput" placeholder="自訂新標籤...">
        <button class="tag-add-btn" onclick="addCustomTag()">+ 加入</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save"   onclick="saveTask()">儲存任務</button>
    </div>
  </div>
</div>

<script src="todo-matrix.js" defer></script>
</body>
</html>
