<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Habits Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="daily-habits.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="8" r="6" fill="white"/>
        <path d="M8 4v4l2.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-name">Daily Habits</span>
  </div>
  <div class="header-right">
    <button class="add-btn" onclick="openModal()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1v10M1 6h10" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      Add Habit
    </button>
  </div>
</header>

<main class="main">

  <!-- Dashboard Section -->
  <section class="dashboard">
    <div class="dashboard-header">
      <span class="dashboard-title">Progress Dashboard</span>
      <div class="dashboard-badges" id="dashboardBadges">
        <!-- Badges will be shown here -->
      </div>
    </div>
    <div class="dashboard-charts" id="dashboardCharts">
      <!-- Placeholder for charts/graphs -->
      <div class="chart-placeholder">Charts coming soon!</div>
    </div>
    <div class="dashboard-motivation" id="dashboardMotivation">
      <!-- Motivational messages -->
    </div>
    <div class="dashboard-summary" id="dashboardSummary">
      <!-- Weekly/monthly summaries -->
    </div>
  </section>

  <section class="habits-section">
    <div class="habits-list inprogress-list" id="habitsListInProgress">
      <div class="inprogress-title">In-Progress</div>
      <!-- In-Progress Habit cards will be inserted here -->
    </div>
    <div class="habits-list done-list" id="habitsListDone">
      <div class="done-title">Done</div>
      <!-- Done Habit cards will be inserted here -->
    </div>
  </section>
</main>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Add New Habit</div>

    <div class="form-field">
      <label class="form-label">Habit Name</label>
      <input class="form-input" type="text" id="habitTitle" placeholder="e.g., Drink water">
    </div>

    <div class="form-field">
      <label class="form-label">Type</label>
      <div class="type-grid">
        <div class="type-pick" data-type="checkbox" onclick="selectType('checkbox')">Yes/No</div>
        <div class="type-pick unsel" data-type="number" onclick="selectType('number')">Quantity</div>
      </div>
    </div>

    <div class="form-field" id="unitField" style="display: none;">
      <label class="form-label">Unit</label>
      <input class="form-input" type="text" id="habitUnit" placeholder="e.g., glasses, minutes">
    </div>

    <div class="form-field">
      <label class="form-label">Goal</label>
      <div class="goal-row">
        <input class="form-input" type="number" id="habitGoal" placeholder="e.g., 8">
        <span id="goalUnitLabel">unit</span>
        <select class="form-input goal-period" id="habitGoalPeriod">
          <option value="day">per day</option>
          <option value="week">per week</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveHabit()">Save Habit</button>
    </div>
  </div>
</div>

<script>
// --- State ---
let habits = [
  { id: 1, title: 'Drink water', type: 'number', goal: 10, unit: 'glasses', todayValue: 3, streak: 2, completedToday: false },
  { id: 2, title: 'Exercise', type: 'number', goal: 2, unit: 'hours', todayValue: 1, streak: 1, completedToday: false },
  { id: 3, title: 'Daily journal', type: 'checkbox', unit: '', todayValue: false, streak: 0, completedToday: false }
];
let selectedType = 'checkbox';
let editMode = false;
let editHabitId = null;

// --- Utility: Find habit by id ---
function getHabit(id) {
  return habits.find(h => h.id === id);
}

// --- Rendering ---
function renderHabits() {
  const listInProgress = document.getElementById('habitsListInProgress');
  const listDone = document.getElementById('habitsListDone');
  listInProgress.innerHTML = '<div class="inprogress-title">In-Progress</div>';
  listDone.innerHTML = '<div class="done-title">Done</div>';
  habits.forEach(habit => {
    const card = makeHabitCard(habit);
    if (habit.completedToday) {
      listDone.appendChild(card);
    } else {
      listInProgress.appendChild(card);
    }
  });
}

function makeHabitCard(habit) {
  const card = document.createElement('div');
  card.className = 'habit-card' + (habit.completedToday ? ' done' : '');
  // --- Card content ---
  const titleRow = document.createElement('div');
  titleRow.className = 'habit-title-row';
  // Checklist visual
  const check = document.createElement('span');
  check.className = 'checkmark' + (habit.completedToday ? ' checked' : '');
  titleRow.appendChild(check);
  // Title
  const title = document.createElement('div');
  title.className = 'habit-title' + (habit.completedToday ? ' done-text' : '');
  title.textContent = habit.title;
  titleRow.appendChild(title);
  // Streak
  const streak = document.createElement('div');
  streak.className = 'habit-streak';
  streak.innerHTML = '🔥 Streak: <span>' + (habit.streak || 0) + '</span>';
  titleRow.appendChild(streak);
  // Edit button
  const editBtn = document.createElement('button');
  editBtn.className = 'edit-btn';
  editBtn.title = 'Edit Habit';
  editBtn.textContent = '✏️';
  editBtn.onclick = e => { e.stopPropagation(); openModal(true, habit); };
  titleRow.appendChild(editBtn);
  card.appendChild(titleRow);
  // Goal
  const goal = document.createElement('div');
  goal.className = 'habit-goal';
  goal.innerHTML = 'Goal: ' + (habit.goal || '') + ' ' + (habit.unit || '') + ' <span class="goal-period">' + (habit.goalPeriod === 'week' ? 'per week' : 'per day') + '</span>';
  card.appendChild(goal);
  // Input
  const input = document.createElement('div');
  input.className = 'habit-input';
  if (habit.type === 'checkbox') {
    // Complete button
    const btn = document.createElement('button');
    btn.className = 'quick-btn';
    btn.textContent = habit.completedToday ? 'Completed' : 'Complete';
    btn.disabled = habit.completedToday;
    btn.onclick = e => { e.stopPropagation(); markHabitComplete(habit.id); };
    input.appendChild(btn);
  } else {
    // Quick add
    const quicks = document.createElement('div');
    quicks.className = 'habit-quick-inputs';
    [1, 2, 5].forEach(val => {
      const qb = document.createElement('button');
      qb.className = 'quick-btn';
      qb.textContent = '+' + val;
      qb.onclick = e => { e.stopPropagation(); quickAdd(habit.id, val); };
      quicks.appendChild(qb);
    });
    input.appendChild(quicks);
    // Range
    const range = document.createElement('input');
    range.type = 'range';
    range.min = 0;
    range.max = habit.goal || 10;
    range.value = habit.todayValue || 0;
    range.step = 1;
    range.oninput = e => updateHabit(habit.id, e.target.value);
    input.appendChild(range);
    // Number input
    const num = document.createElement('input');
    num.type = 'number';
    num.value = habit.todayValue || '';
    num.placeholder = '0';
    num.onchange = e => updateHabit(habit.id, e.target.value);
    input.appendChild(num);
    // Unit
    if (habit.unit) {
      const unitSpan = document.createElement('span');
      unitSpan.textContent = habit.unit;
      input.appendChild(unitSpan);
    }
  }
  card.appendChild(input);
  // Status
  const status = document.createElement('div');
  status.className = 'habit-status';
  if (habit.type === 'checkbox') {
    status.textContent = habit.completedToday ? '✅ Done' : '❌ Not done';
  }
  card.appendChild(status);
  return card;
}

// --- Habit logic ---
function markHabitComplete(id) {
  const habit = getHabit(id);
  if (!habit || habit.completedToday) return;
  habit.todayValue = true;
  habit.completedToday = true;
  habit.streak = (habit.streak || 0) + 1;
  renderHabits();
}

function updateHabit(id, value) {
  const habit = getHabit(id);
  if (!habit) return;
  if (habit.type === 'number') {
    habit.todayValue = Number(value);
    habit.completedToday = habit.todayValue >= (habit.goal || 0);
  } else {
    habit.todayValue = value === true || value === 'true';
    habit.completedToday = habit.todayValue;
  }
  habit.streak = habit.completedToday ? (habit.streak || 0) + 1 : 0;
  renderHabits();
}

function quickAdd(id, amount) {
  const habit = getHabit(id);
  if (!habit) return;
  habit.todayValue = Number(habit.todayValue || 0) + amount;
  updateHabit(id, habit.todayValue);
}

// --- Modal logic ---
function openModal(edit = false, habit = null) {
  document.getElementById('modalOverlay').classList.remove('hidden');
  editMode = edit;
  editHabitId = habit ? habit.id : null;
  if (edit && habit) {
    document.querySelector('.modal-title').textContent = 'Edit Habit';
    document.getElementById('habitTitle').value = habit.title;
    selectType(habit.type);
    document.getElementById('habitUnit').value = habit.unit || '';
    document.getElementById('habitGoal').value = habit.goal || '';
    document.getElementById('habitGoalPeriod').value = habit.goalPeriod || 'day';
    updateGoalUnitLabel();
  } else {
    document.querySelector('.modal-title').textContent = 'Add New Habit';
    document.getElementById('habitTitle').value = '';
    document.getElementById('habitUnit').value = '';
    document.getElementById('habitGoal').value = '';
    document.getElementById('habitGoalPeriod').value = 'day';
    selectType('checkbox');
    updateGoalUnitLabel();
  }
  setTimeout(() => document.getElementById('habitTitle').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  editMode = false;
  editHabitId = null;
}

function selectType(type) {
  selectedType = type;
  document.querySelectorAll('.type-pick').forEach(pick => {
    pick.classList.toggle('unsel', pick.dataset.type !== type);
  });
  document.getElementById('unitField').style.display = type === 'number' ? 'block' : 'none';
  updateGoalUnitLabel();
}

function updateGoalUnitLabel() {
  const unit = document.getElementById('habitUnit').value.trim() || 'unit';
  document.getElementById('goalUnitLabel').textContent = selectedType === 'number' ? unit : '';
}
document.getElementById('habitUnit').addEventListener('input', updateGoalUnitLabel);

function saveHabit() {
  const title = document.getElementById('habitTitle').value.trim();
  if (!title) return;
  const unit = selectedType === 'number' ? document.getElementById('habitUnit').value.trim() : '';
  const goal = Number(document.getElementById('habitGoal').value.trim()) || 0;
  const goalPeriod = document.getElementById('habitGoalPeriod').value;
  if (editMode && editHabitId !== null) {
    updateHabitDetails(editHabitId, { title, type: selectedType, unit, goal, goalPeriod });
  } else {
    habits.push({
      id: Date.now(),
      title,
      type: selectedType,
      unit,
      goal,
      goalPeriod,
      todayValue: selectedType === 'checkbox' ? false : 0,
      streak: 0,
      completedToday: false
    });
  }
  renderHabits();
  closeModal();
}

function editHabit(id) {
  const habit = getHabit(id);
  if (habit) openModal(true, habit);
}

function updateHabitDetails(id, details) {
  const habit = getHabit(id);
  if (!habit) return;
  habit.title = details.title;
  habit.type = details.type;
  habit.unit = details.unit;
  habit.goal = details.goal;
  habit.goalPeriod = details.goalPeriod;
  habit.todayValue = habit.type === 'checkbox' ? false : 0;
  habit.streak = habit.streak || 0;
  habit.completedToday = false;
}

// --- Modal dismiss & keyboard shortcuts ---
document.getElementById('modalOverlay').addEventListener('click', function (e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter' &&
      !document.getElementById('modalOverlay').classList.contains('hidden')) saveHabit();
});
document.getElementById('habitTitle').addEventListener('keydown',  e => { if (e.key === 'Enter') saveHabit(); });

// --- Dashboard placeholder ---
function updateDashboard() {
  document.getElementById('dashboardBadges').innerHTML = '<span class="badge">🏅 Streak Master</span>';
  document.getElementById('dashboardMotivation').textContent = 'Keep going! You are building great habits!';
  document.getElementById('dashboardSummary').textContent = 'Weekly/Monthly summaries coming soon!';
}

// --- Init ---
renderHabits();
updateDashboard();
</script>

</body>
</html>
