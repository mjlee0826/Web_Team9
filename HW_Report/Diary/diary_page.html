<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心靈時光機 | 數位日記</title>
    <link rel="stylesheet" href="diary_page.css">
</head>
<body>

    <div class="diary-app">
        <header class="app-header">
            <h1>心靈時光機</h1>
            <p>記錄當下的情緒與思考</p>
        </header>

        <main class="diary-container">
            <section class="editor-section">
                <div class="card">
                    <input type="text" class="diary-title" placeholder="給這份心情起個標題...">
                    <textarea class="diary-content" placeholder="今天發生了什麼精彩的事？"></textarea>
                    <div class="editor-footer">
                        <span class="date-display">載入中...</span>
                        <button class="save-btn">儲存日記</button>
                    </div>
                </div>
            </section>

            <hr class="divider">

            <section class="history-section">
                <h3>過往點滴</h3>
                <div class="history-grid">
                    <article class="diary-card">
                        <div class="card-date">2026.03.12</div>
                        <h4>台北的小雨</h4>
                        <p>今天在街角那間咖啡廳坐了一下午，雨聲配上爵士樂真的很有氛圍...</p>
                        <button class="read-more">閱讀全文</button>
                    </article>

                    <article class="diary-card">
                        <div class="card-date">2026.03.10</div>
                        <h4>終於完成專案了！</h4>
                        <p>這三個月的努力沒有白費，雖然過程很辛苦，但看到成果那刻真的...</p>
                        <button class="read-more">閱讀全文</button>
                    </article>
                </div>
            </section>
        </main>
    </div>
    <script>
        const today = new Date();
        document.querySelector('.date-display').textContent = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日`;

        const saveBtn = document.querySelector('.save-btn');
        const titleInput = document.querySelector('.diary-title');
        const contentInput = document.querySelector('.diary-content');
        const historyGrid = document.querySelector('.history-grid');

        saveBtn.addEventListener('click', function() {
            
            const title = titleInput.value;
            const content = contentInput.value;

            if (title === "" || content === "") {
                alert("請輸入標題與內容");
                return; 
            }

            const now = new Date();
            const dateString = `${now.getFullYear()}.${(now.getMonth()+1)}.${now.getDate()}`;

            const newCard = document.createElement('article');
            newCard.className = 'diary-card';
            newCard.innerHTML = `
                <div class="card-date">${dateString}</div>
                <h4>${title}</h4>
                <p>${content}</p>
                <button class="read-more">閱讀全文</button>
            `;

            historyGrid.prepend(newCard);

            titleInput.value = "";
            contentInput.value = "";
            
            console.log("日記已儲存！"); 
        });

        historyGrid.addEventListener('click', function(e) {
                
        if (e.target.classList.contains('read-more')) {
            
            const card = e.target.closest('.diary-card');
            const title = card.querySelector('h4').textContent;
            const content = card.querySelector('p').textContent;

            alert(`【${title}】\n\n${content}`);
    }
});
    </script>
</body>
</html>
